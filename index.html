<style>
:root{
  --bg:#FAFAFC;
  --ink:#16181D;
  --ink-soft:#6B7280;
  --rule:#E7E8EC;
  --primary:#5B5BF5;
  --primary-dark:#4444E0;
  --primary-soft:#EEEEFD;
  --accent2:#00C2A8;
  --panel:#FFFFFF;
  --good:#16A34A;
  --warn:#D97706;
  --mono:'Poppins', sans-serif;
  --display:'Poppins', sans-serif;
  --body:'Poppins', sans-serif;
  --paper:var(--bg);
  --accent:var(--primary);
  --accent-soft:var(--primary-soft);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--body);}
button{font-family:inherit;cursor:pointer;}
input,textarea,select{font-family:inherit;}

/* ============ APP SHELL ============ */
#app{display:flex;flex-direction:column;height:100vh;}
body.on-landing #app{height:auto;display:block;}

.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;border-bottom:1px solid var(--rule);
  background:#fff;position:sticky;top:0;z-index:5;
}
.brand{display:flex;align-items:baseline;gap:10px;}
.brand .mark{font-family:var(--display);font-weight:800;font-size:21px;letter-spacing:-0.01em;color:var(--ink);}
.brand .mark span{color:var(--primary);}
.brand .tag{font-family:var(--mono);font-size:11px;color:var(--ink-soft);letter-spacing:.02em;}
.topbar-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}

.seg{display:flex;border:1px solid var(--rule);border-radius:10px;overflow:hidden;}
.seg button{background:var(--panel);border:none;padding:7px 13px;font-size:12.5px;color:var(--ink-soft);border-right:1px solid var(--rule);font-weight:500;}
.seg button:last-child{border-right:none;}
.seg button.active{background:var(--primary);color:#fff;}

.btn{
  border:1px solid var(--rule);background:var(--panel);color:var(--ink);
  padding:9px 16px;border-radius:10px;font-size:13px;font-weight:600;
  display:inline-flex;align-items:center;gap:6px;transition:all .12s;
}
.btn:hover{border-color:var(--primary);color:var(--primary);}
.btn.primary{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 2px 8px rgba(91,91,245,.3);}
.btn.primary:hover{background:var(--primary-dark);color:#fff;}
.btn.ghost{background:transparent;border-color:transparent;color:var(--ink-soft);}
.btn.small{padding:5px 11px;font-size:11.5px;border-radius:8px;}

.layout{display:flex;flex:1;min-height:0;}
.editor-pane{width:46%;min-width:380px;overflow-y:auto;padding:22px 26px 90px;border-right:1px solid var(--rule);}
.preview-pane{flex:1;overflow-y:auto;padding:30px;display:flex;justify-content:center;background:
  repeating-linear-gradient(135deg, rgba(0,0,0,0.015) 0 2px, transparent 2px 14px);}

/* ============ SECTION CARDS ============ */
.sec-card{
  background:var(--panel);border:1px solid var(--rule);border-radius:14px;
  margin-bottom:14px;overflow:hidden;box-shadow:0 1px 2px rgba(16,24,40,.04);
}
.sec-card.disabled{opacity:.5;}
.sec-head{
  display:flex;align-items:center;gap:8px;padding:13px 16px;
  border-bottom:1px solid var(--rule);cursor:pointer;background:#fff;
}
.sec-head .num{font-family:var(--mono);font-size:11px;color:var(--ink-soft);width:18px;}
.sec-head .name{font-family:var(--display);font-weight:600;font-size:15px;flex:1;}
.sec-head .req{font-family:var(--mono);font-size:9.5px;color:var(--primary);border:1px solid var(--primary-soft);background:var(--primary-soft);padding:2px 7px;border-radius:10px;}
.sec-head .chev{transition:transform .15s;color:var(--ink-soft);font-size:12px;}
.sec-head .chev.open{transform:rotate(90deg);}
.sec-controls{display:flex;gap:4px;align-items:center;}
.icon-btn{background:none;border:none;color:var(--ink-soft);font-size:14px;padding:3px 5px;border-radius:6px;}
.icon-btn:hover{background:var(--primary-soft);color:var(--primary);}
.toggle{
  width:30px;height:17px;border-radius:10px;background:var(--rule);position:relative;border:none;flex-shrink:0;
}
.toggle.on{background:var(--good);}
.toggle::after{content:'';position:absolute;top:2px;left:2px;width:13px;height:13px;border-radius:50%;background:#fff;transition:left .15s;}
.toggle.on::after{left:15px;}

.sec-body{padding:14px;display:none;}
.sec-body.open{display:block;}

.field{margin-bottom:11px;}
.field label{display:flex;justify-content:space-between;font-size:11.5px;color:var(--ink-soft);margin-bottom:4px;font-weight:600;letter-spacing:.01em;}
.field label .opt{font-weight:400;color:#9c9484;font-style:italic;}
.field input[type=text],.field input[type=email],.field input[type=tel],.field input[type=url],.field input[type=month],.field input[type=number],.field textarea,.field select{
  width:100%;padding:9px 12px;border:1px solid var(--rule);border-radius:10px;background:#fff;font-size:13.5px;color:var(--ink);
}
.field textarea{resize:vertical;min-height:60px;line-height:1.45;}
.field input:focus,.field textarea:focus,.field select:focus{outline:2px solid var(--primary);outline-offset:1px;border-color:var(--primary);}
.field.invalid input,.field.invalid textarea{border-color:#DC2626;}
.field .err{color:#DC2626;font-size:10.5px;margin-top:3px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.checkrow{display:flex;align-items:center;gap:7px;font-size:12.5px;color:var(--ink-soft);margin:8px 0;}
.checkrow input{accent-color:var(--primary);}

.entry-block{border:1px solid var(--rule);border-radius:12px;padding:14px;margin-bottom:10px;background:#FCFCFD;position:relative;}
.entry-block .entry-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.entry-block .entry-title{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;}
.entry-actions{display:flex;gap:3px;}

.add-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
.tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.tag{background:var(--primary-soft);color:var(--primary-dark);border-radius:20px;padding:5px 12px;font-size:12px;font-weight:500;display:flex;align-items:center;gap:6px;}
.tag button{background:none;border:none;color:var(--primary-dark);font-size:12px;line-height:1;opacity:.6;}
.tag button:hover{opacity:1;}
.tag-input{display:flex;gap:6px;margin-top:6px;}
.tag-input input{flex:1;}

.counter{font-family:var(--mono);font-size:10.5px;color:var(--ink-soft);}
.counter.over{color:#DC2626;}
.help{font-size:11px;color:var(--ink-soft);margin-top:4px;line-height:1.4;}
.ai-btn{font-family:var(--mono);font-size:10.5px;font-weight:600;background:var(--primary);color:#fff;border:none;padding:6px 12px;border-radius:8px;display:inline-flex;align-items:center;gap:5px;}
.ai-btn:hover{background:var(--primary-dark);}
.ai-btn:disabled{opacity:.5;cursor:wait;}
.ai-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}

.upload-box{
  border:1.5px dashed var(--rule);border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;
  background:#fff;cursor:pointer;transition:border-color .15s,background .15s;
}
.upload-box:hover,.upload-box.drag{border-color:var(--primary);background:var(--primary-soft);}
.upload-thumb{width:52px;height:52px;border-radius:50%;object-fit:cover;flex-shrink:0;border:1px solid var(--rule);}
.upload-text{display:flex;flex-direction:column;gap:2px;font-size:12.5px;color:var(--ink-soft);flex:1;}
.upload-text span:first-child{color:var(--ink);font-weight:600;}
.upload-icon{font-size:18px;}
.upload-hint{font-size:10.5px;color:#9aa0ac;}
.upload-text .icon-btn{align-self:flex-start;margin-top:2px;}

.avatar-upload{
  display:flex;align-items:center;gap:14px;padding:14px;border:1.5px dashed var(--rule);
  border-radius:14px;cursor:pointer;background:#fff;margin-bottom:16px;transition:border-color .15s,background .15s;
}
.avatar-upload:hover,.avatar-upload.drag{border-color:var(--primary);background:var(--primary-soft);}
.avatar-circle{
  width:56px;height:56px;border-radius:50%;flex-shrink:0;background:var(--primary-soft);
  display:flex;align-items:center;justify-content:center;overflow:hidden;border:2px solid #fff;box-shadow:0 0 0 2px var(--rule);
}
.avatar-circle img{width:100%;height:100%;object-fit:cover;}
.avatar-plus{font-size:24px;color:var(--primary);font-weight:300;line-height:1;}
.avatar-text{display:flex;flex-direction:column;gap:2px;flex:1;font-size:13px;color:var(--ink);font-weight:600;}
.avatar-text .upload-hint{font-weight:400;color:var(--ink-soft);font-size:11.5px;}
.avatar-text .opt{font-weight:400;color:#9c9484;font-style:italic;font-size:11px;}

.empty-warn{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--warn);background:#FEF3E2;border:1px solid #FBE3B8;padding:8px 12px;border-radius:10px;margin-bottom:10px;}

.editor-footer-actions{margin-top:8px;}
.disabled-sections-rail{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.rail-chip{font-size:11.5px;border:1px dashed var(--rule);background:transparent;color:var(--ink-soft);padding:5px 10px;border-radius:20px;display:flex;align-items:center;gap:5px;}
.rail-chip:hover{border-color:var(--primary);color:var(--primary);}
.rail-title{font-size:11px;color:var(--ink-soft);width:100%;margin-bottom:2px;font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}

/* ============ RESUME PREVIEW (the "paper") ============ */
.paper{
  width:100%;max-width:680px;background:#fff;color:#1a1a1a;
  box-shadow:0 8px 30px rgba(16,24,40,.10);min-height:880px;border-radius:14px;
  padding:46px 50px;font-family:'Poppins',sans-serif;
}
.paper.ats{font-family:Arial,Helvetica,sans-serif;border-radius:0;}
.p-name{font-family:'Poppins',sans-serif;font-weight:700;font-size:28px;letter-spacing:-0.01em;margin:0 0 2px;}
.paper.ats .p-name{font-family:Arial,sans-serif;font-size:24px;}
.p-title{font-size:14px;font-weight:500;color:var(--primary);margin-bottom:8px;}
.paper.ats .p-title{color:#333;}
.p-contact{font-size:12px;color:#555;display:flex;flex-wrap:wrap;gap:10px;margin-bottom:4px;}
.p-contact span:not(:last-child)::after{content:'·';margin-left:10px;color:#bbb;}
.p-photo{width:64px;height:64px;border-radius:50%;object-fit:cover;float:right;margin-left:14px;border:2px solid var(--primary-soft);}
.p-header{overflow:hidden;text-align:left;}
.paper.align-center .p-header{text-align:center;}
.paper.align-center .p-photo{float:none;margin:0 auto 12px;display:block;}
.paper.align-center .p-contact{justify-content:center;}
.paper{text-align:left;}
.p-section{margin-top:18px;}
.p-h{font-family:'Poppins',sans-serif;font-size:12.5px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--primary);border-bottom:1px solid #ECECF6;padding-bottom:4px;margin-bottom:9px;}
.paper.ats .p-h{font-family:Arial,sans-serif;color:#000;border-bottom:1px solid #999;}
.p-entry{margin-bottom:11px;}
.p-entry-top{display:flex;justify-content:space-between;gap:10px;font-size:13.5px;}
.p-entry-role{font-weight:700;}
.p-entry-org{color:#444;}
.p-entry-date{font-family:'Poppins',sans-serif;font-size:11px;color:#888;white-space:nowrap;}
.paper.ats .p-entry-date{font-family:inherit;}
.p-entry-loc{font-size:11.5px;color:#888;font-style:italic;}
.p-bullets{margin:5px 0 0;padding-left:18px;font-size:12.8px;line-height:1.55;color:#2a2a2a;}
.p-bullets li{margin-bottom:2px;}
.p-summary{font-size:13px;line-height:1.6;color:#2a2a2a;}
.p-tags{display:flex;flex-wrap:wrap;gap:6px;}
.p-tags span{background:var(--primary-soft);color:var(--primary-dark);border-radius:8px;padding:3px 10px;font-size:11.5px;font-weight:500;}
.paper.ats .p-tags span{background:none;border:1px solid #999;color:#333;}
.p-skillgroup{margin-bottom:6px;font-size:12.5px;}
.p-skillgroup b{font-size:11.5px;text-transform:uppercase;letter-spacing:.05em;color:#666;margin-right:6px;}
.p-empty-state{color:#aaa;font-size:12px;text-align:center;padding:60px 0;font-style:italic;}

@media (max-width:980px){
  .layout{flex-direction:column;}
  .editor-pane{width:100%;border-right:none;border-bottom:1px solid var(--rule);max-height:60vh;}
  .preview-pane{padding:16px;}
  .paper{padding:28px 24px;}
}
@media print{
  html, body{height:auto !important;overflow:visible !important;}
  #app{height:auto !important;display:block !important;}
  .topbar,.editor-pane{display:none !important;}
  .layout{display:block !important;height:auto !important;overflow:visible !important;}
  .preview-pane{
    display:block !important;height:auto !important;overflow:visible !important;
    padding:0 !important;background:none !important;
  }
  .paper{box-shadow:none !important;margin:0 auto !important;width:100% !important;max-width:none !important;border-radius:0 !important;min-height:0 !important;}
}

/* ============ LANDING PAGE ============ */
body.on-landing{background:#fff;}
.lp-nav{border-bottom:1px solid var(--rule);position:sticky;top:0;background:#fff;z-index:10;}
.lp-nav-inner{max-width:1080px;margin:0 auto;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;}
.brand-row{display:flex;align-items:center;gap:14px;}
.back-link{background:none;border:none;color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;}
.back-link:hover{color:var(--primary);}

.lp-hero{padding:64px 24px 40px;background:linear-gradient(180deg,#F4F4FE 0%,#fff 100%);}
.lp-hero-inner{max-width:880px;margin:0 auto;text-align:center;}
.lp-pill{display:inline-block;background:var(--primary-soft);color:var(--primary-dark);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;margin-bottom:18px;}
.lp-hero h1{font-size:44px;font-weight:800;line-height:1.15;letter-spacing:-0.02em;margin:0 0 16px;color:var(--ink);}
.lp-grad{color:var(--primary);}
.lp-sub{font-size:17px;color:var(--ink-soft);max-width:600px;margin:0 auto 28px;line-height:1.6;}
.lp-cta-row{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:48px;}
.btn.lg{padding:14px 28px;font-size:15px;border-radius:12px;}
.lp-cta-note{font-size:12.5px;color:var(--ink-soft);}
.lp-hero-preview{transform:scale(0.82);transform-origin:top center;margin:0 auto;display:flex;justify-content:center;filter:drop-shadow(0 20px 40px rgba(16,24,40,.12));}
.lp-hero-preview .paper{max-width:600px;}

.lp-logos{padding:30px 24px;text-align:center;border-bottom:1px solid var(--rule);border-top:1px solid var(--rule);}
.lp-logos p{font-size:12px;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;font-weight:600;}
.lp-logos-row{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;color:#9AA0AC;font-weight:700;font-size:15px;}

.lp-section{max-width:1080px;margin:0 auto;padding:72px 24px;text-align:center;}
.lp-section h2{font-size:32px;font-weight:800;letter-spacing:-0.01em;margin:0 0 12px;}
.lp-section-sub{font-size:15.5px;color:var(--ink-soft);max-width:560px;margin:0 auto 40px;line-height:1.6;}
.lp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;text-align:left;}
.lp-card{border:1px solid var(--rule);border-radius:16px;padding:24px;background:#fff;box-shadow:0 1px 2px rgba(16,24,40,.04);}
.lp-card-icon{width:40px;height:40px;border-radius:11px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:18px;margin-bottom:14px;}
.lp-card h3{font-size:16px;font-weight:700;margin:0 0 8px;}
.lp-card p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin:0;}

.lp-steps-row{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;text-align:left;margin-top:8px;}
.lp-step-num{width:34px;height:34px;border-radius:50%;background:var(--primary);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;margin-bottom:14px;}
.lp-step h3{font-size:16px;font-weight:700;margin:0 0 6px;}
.lp-step p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin:0;}

.lp-faq{max-width:680px;}
.lp-faq-item{border:1px solid var(--rule);border-radius:12px;padding:14px 18px;margin-bottom:10px;text-align:left;background:#fff;}
.lp-faq-item summary{font-weight:600;font-size:14.5px;cursor:pointer;}
.lp-faq-item p{font-size:13.5px;color:var(--ink-soft);line-height:1.55;margin:10px 0 0;}

.lp-final-cta{background:var(--primary);color:#fff;text-align:center;padding:64px 24px;}
.lp-final-cta h2{font-size:28px;font-weight:800;margin:0 0 10px;}
.lp-final-cta p{font-size:15px;opacity:.9;margin:0 0 24px;}
.lp-final-cta .btn.primary{background:#fff;color:var(--primary);border-color:#fff;}
.lp-final-cta .btn.primary:hover{background:#F0F0FF;}

.lp-footer{display:flex;justify-content:space-between;max-width:1080px;margin:0 auto;padding:28px 24px 50px;font-size:12.5px;color:var(--ink-soft);flex-wrap:wrap;gap:8px;}

@media (max-width:780px){
  .lp-hero h1{font-size:30px;}
  .lp-grid,.lp-steps-row{grid-template-columns:1fr;}
  .lp-hero-preview{transform:scale(0.68);}
}

/* ============ PROGRAMMATIC SEO LANDING PAGES ============ */
.seo-page{max-width:880px;margin:0 auto;padding:0 24px 60px;}
.seo-hero{text-align:center;padding:48px 0 30px;}
.seo-eyebrow{display:inline-block;background:var(--primary-soft);color:var(--primary-dark);font-size:12px;font-weight:600;padding:6px 14px;border-radius:20px;margin-bottom:16px;}
.seo-hero h1{font-size:36px;font-weight:800;letter-spacing:-0.01em;line-height:1.18;margin:0 0 16px;}
.seo-hero-sub{font-size:15.5px;color:var(--ink-soft);line-height:1.6;max-width:620px;margin:0 auto 26px;}
.seo-cta-btn{display:inline-flex;align-items:center;gap:6px;background:var(--primary);color:#fff;font-weight:700;font-size:14.5px;padding:13px 24px;border-radius:12px;border:none;cursor:pointer;box-shadow:0 4px 14px rgba(91,91,245,.3);}
.seo-cta-btn:hover{background:var(--primary-dark);}
.seo-cta-btn-light{background:#fff;color:var(--primary);box-shadow:none;}
.seo-cta-btn-light:hover{background:#F0F0FF;}
.seo-intro p{font-size:15px;line-height:1.7;color:var(--ink);margin-bottom:16px;}
.seo-features{margin-top:42px;text-align:center;}
.seo-features h2,.seo-faq h2,.seo-cta-banner h2{font-size:24px;font-weight:800;margin-bottom:22px;}
.seo-features-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px;text-align:left;}
.seo-feature-card{border:1px solid var(--rule);border-radius:14px;padding:18px;background:#fff;}
.seo-feature-icon{width:34px;height:34px;border-radius:10px;background:var(--primary-soft);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px;margin-bottom:9px;}
.seo-feature-card h3{font-size:14.5px;font-weight:700;margin:0 0 5px;}
.seo-feature-card p{font-size:13px;color:var(--ink-soft);margin:0;line-height:1.5;}
.seo-cta-banner{margin-top:50px;background:var(--primary);color:#fff;text-align:center;padding:42px 22px;border-radius:18px;}
.seo-cta-banner p{opacity:.92;margin-bottom:20px;font-size:14.5px;}
.seo-faq{margin-top:50px;}
.seo-faq-item{border:1px solid var(--rule);border-radius:12px;padding:14px 18px;margin-bottom:10px;background:#fff;}
.seo-faq-item summary{font-weight:600;font-size:14px;cursor:pointer;}
.seo-faq-item p{font-size:13px;color:var(--ink-soft);line-height:1.55;margin:10px 0 0;}

.guides-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:14px;}

function isEmpty(v){ return !v || !String(v).trim(); }
function validatePersonal(){
  const errs = {};
  if(isEmpty(state.personal.fullName)) errs.fullName = 'Full name is required';

  else if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(state.personal.email)) errs.email = 'Enter a valid email';
  if(isEmpty(state.personal.phone)) errs.phone = 'Phone is required';
  return errs;
}
function dateInvalid(start,end,present){
  if(present) return false;
  if(!start || !end) return false;
  return new Date(end+'-01') < new Date(start+'-01');
}

/* =====================================================================
   AI ASSIST  (calls Claude via the Anthropic API)
===================================================================== */
async function callClaude(prompt){
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-6',
      max_tokens:1000,
      messages:[{role:'user', content: prompt}]
    })
  });
  const data = await res.json();
  const text = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n');
  return text.trim();
}

async function aiGenerateSummary(btn){
  btn.disabled = true; btn.textContent = '… writing';
  try{
    const title = state.experience[0]?.jobTitle || 'professional';
    const skills = [...state.skills.technical, ...state.skills.soft].join(', ');
    const prompt = `Write a concise, ATS-friendly professional resume summary (between 200 and 400 characters, NOT words — keep it to 2-3 sentences) for a ${title}. Relevant skills: ${skills||'general professional skills'}. Use confident, active language, no first-person pronouns, no markdown, plain text only. Return only the summary text.`;
    const text = await callClaude(prompt);
    setState(s=>{ s.summary.text = text; });
  }catch(e){ alert('AI request failed. Check your connection.'); }
  finally{ btn.disabled=false; btn.textContent='✦ AI generate summary'; }
}

async function aiImproveBullets(kind, idx, btn){
  btn.disabled = true; const orig = btn.textContent; btn.textContent='… improving';
  try{
    const arr = state[kind];
    const item = arr[idx];
    const raw = item.description || '';
    const prompt = `Rewrite the following resume bullet content into 3-5 punchy, ATS-friendly bullet points. Start each with a strong action verb, include measurable impact/metrics where plausible, no markdown bullets or dashes — return one bullet per line, plain text only.\n\nRole: ${item.jobTitle||item.projectName||''}\nOriginal content:\n${raw||'(no content yet, infer reasonable bullets from the role title)'}`;
    const text = await callClaude(prompt);
    setState(s=>{ s[kind][idx].description = text; });
  }catch(e){ alert('AI request failed. Check your connection.'); }
  finally{ btn.disabled=false; btn.textContent=orig; }
}

async function aiSuggestSkills(btn){
  btn.disabled = true; btn.textContent='… thinking';
  try{
    const title = state.experience[0]?.jobTitle || state.personal.fullName ? (state.experience[0]?.jobTitle || 'professional') : 'professional';
    const prompt = `List 8 technical/hard skills and 5 soft skills relevant to the job title "${title}" for a resume. Return strict JSON only, no markdown, in the form {"technical":["..."],"soft":["..."]}.`;
    const text = await callClaude(prompt);
    const json = JSON.parse(text.replace(/```json|```/g,'').trim());
    setState(s=>{
      json.technical.forEach(t=>{ if(!s.skills.technical.includes(t)) s.skills.technical.push(t); });
      json.soft.forEach(t=>{ if(!s.skills.soft.includes(t)) s.skills.soft.push(t); });
    });
  }catch(e){ alert('AI request failed or returned an unexpected format.'); }
  finally{ btn.disabled=false; btn.textContent='✦ AI suggest skills'; }
}

/* =====================================================================
   RENDER: PREVIEW
===================================================================== */
function fmtMonth(m){
  if(!m) return '';
  const [y,mo] = m.split('-');
  const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return mo? `${names[parseInt(mo,10)-1]} ${y}` : y;
}
function bulletsHTML(text){
  const lines = (text||'').split('\n').map(l=>l.replace(/^[-•\u2022]\s*/,'').trim()).filter(Boolean);
  if(!lines.length) return '';
  return `<ul class="p-bullets">${lines.map(l=>`<li>${esc(l)}</li>`).join('')}</ul>`;
}

function renderPreview(){
  const p = state.personal;
  const hasAnyContent = p.fullName || p.email || state.experience.some(e=>e.jobTitle);
  if(!hasAnyContent){
    return `<div class="paper ${state.atsMode?'ats':''}" id="resume-paper"><div class="p-empty-state">Your resume preview will appear here.<br>Start by filling in Personal Information on the left.</div></div>`;
  }
  let html = `<div class="paper ${state.atsMode?'ats':''} align-${state.headerAlign}" id="resume-paper">`;

  // Personal header
  html += `<div class="p-header">`;
  if(p.showImage && p.profileImage && !state.atsMode) html += `<img class="p-photo" src="${esc(p.profileImage)}"/>`;
  html += `<h1 class="p-name">${esc(p.fullName)||'Your Name'}</h1>`;
  if(p.title) html += `<div class="p-title">${esc(p.title)}</div>`;
  const contactBits = [p.email, p.phone, p.cityCountry, p.showAddress?p.address:'', p.linkedinUrl, p.portfolioUrl].filter(Boolean);
  html += `<div class="p-contact">${contactBits.map(c=>`<span>${esc(c)}</span>`).join('')}</div>`;
  html += `</div>`;

  state.sectionOrder.forEach(key=>{
    if(!state.sectionEnabled[key] || key==='personal') return;
    const inner = renderPreviewSection(key);
    if(inner) html += `<div class="p-section"><div class="p-h">${SECTION_DEFS[key].label}</div>${inner}</div>`;
  });

  html += `</div>`;
  return html;
}

function renderPreviewSection(key){
  switch(key){
    case 'summary': return state.summary.text? `<p class="p-summary">${esc(state.summary.text)}</p>` : '';
    case 'experience': return state.experience.filter(e=>e.jobTitle||e.companyName).map(e=>`
      <div class="p-entry">
        <div class="p-entry-top">
          <div><span class="p-entry-role">${esc(e.jobTitle)}</span> <span class="p-entry-org">— ${esc(e.companyName)}</span></div>
          <div class="p-entry-date">${fmtMonth(e.startDate)} – ${e.present?'Present':fmtMonth(e.endDate)}</div>
        </div>
        ${e.location? `<div class="p-entry-loc">${esc(e.location)}</div>`:''}
        ${bulletsHTML(e.description)}
        ${e.achievements? `<div class="p-entry-loc" style="margin-top:3px;font-style:normal;color:#555;">${esc(e.achievements)}</div>`:''}
      </div>`).join('') || '';
    case 'internships': return state.internships.filter(e=>e.jobTitle||e.companyName).map(e=>`
      <div class="p-entry">
        <div class="p-entry-top">
          <div><span class="p-entry-role">${esc(e.jobTitle)}</span> <span class="p-entry-org">— ${esc(e.companyName)}</span></div>
          <div class="p-entry-date">${fmtMonth(e.startDate)} – ${e.present?'Present':fmtMonth(e.endDate)}</div>
        </div>
        ${bulletsHTML(e.description)}
      </div>`).join('') || '';
    case 'education': return state.education.filter(e=>e.degree||e.institution).map(e=>`
      <div class="p-entry">
        <div class="p-entry-top">
          <div><span class="p-entry-role">${esc(e.degree)}</span> <span class="p-entry-org">— ${esc(e.institution)}</span></div>
          <div class="p-entry-date">${esc(e.startYear)}${e.startYear||e.endYear?' – ':''}${esc(e.endYear)}</div>
        </div>
        ${[e.gpa?`GPA: ${esc(e.gpa)}`:'', e.honors?esc(e.honors):''].filter(Boolean).join(' · ')?`<div class="p-entry-loc">${[e.gpa?`GPA: ${esc(e.gpa)}`:'', e.honors?esc(e.honors):''].filter(Boolean).join(' · ')}</div>`:''}
        ${e.coursework? `<div class="p-entry-loc">Coursework: ${esc(e.coursework)}</div>`:''}
      </div>`).join('') || '';
    case 'skills': {
      const sk = state.skills; let out='';
      if(sk.technical.length) out += `<div class="p-skillgroup"><b>Technical</b><div class="p-tags">${sk.technical.map(t=>`<span>${esc(t)}${sk.showProficiency&&sk.proficiency[t]?` (${proficiencyLabel(sk.proficiency[t])})`:''}</span>`).join('')}</div></div>`;
      if(sk.soft.length) out += `<div class="p-skillgroup"><b>Soft skills</b><div class="p-tags">${sk.soft.map(t=>`<span>${esc(t)}</span>`).join('')}</div></div>`;
      return out;
    }
    case 'projects': return state.projects.filter(e=>e.projectName).map(e=>`
      <div class="p-entry">
        <div class="p-entry-top"><div class="p-entry-role">${esc(e.projectName)}${e.role? ' — '+esc(e.role):''}</div></div>
        ${e.toolsUsed? `<div class="p-entry-loc">${esc(e.toolsUsed)}</div>`:''}
        ${bulletsHTML(e.description)}
        ${e.impact? `<div class="p-entry-loc" style="font-style:normal;color:#555;">${esc(e.impact)}</div>`:''}
        ${[e.liveLink,e.githubLink].filter(Boolean).length? `<div class="p-entry-loc">${[e.liveLink,e.githubLink].filter(Boolean).join(' · ')}</div>`:''}
      </div>`).join('') || '';
    case 'certifications': return state.certifications.filter(e=>e.certificationName).map(e=>`
      <div class="p-entry">
        <div class="p-entry-top">
          <div><span class="p-entry-role">${esc(e.certificationName)}</span><span class="p-entry-org"> — ${esc(e.issuer)}</span></div>
          <div class="p-entry-date">${fmtMonth(e.completionDate)}</div>
        </div>
        ${e.credentialId? `<div class="p-entry-loc">ID: ${esc(e.credentialId)}</div>`:''}
      </div>`).join('') || '';
    case 'achievements': return state.achievements.filter(e=>e.title).map(e=>`
      <div class="p-entry"><div class="p-entry-top"><div class="p-entry-role">${esc(e.title)}</div><div class="p-entry-date">${fmtMonth(e.date)}</div></div>
      ${e.description? `<div class="p-summary">${esc(e.description)}</div>`:''}</div>`).join('') || '';
    case 'languages': return state.languages.filter(e=>e.languageName).length? `<div class="p-tags">${state.languages.filter(e=>e.languageName).map(e=>`<span>${esc(e.languageName)} — ${e.proficiencyLevel}</span>`).join('')}</div>` : '';
    case 'volunteer': return state.volunteer.filter(e=>e.role||e.organization).map(e=>`
      <div class="p-entry"><div class="p-entry-top"><div><span class="p-entry-role">${esc(e.role)}</span><span class="p-entry-org"> — ${esc(e.organization)}</span></div><div class="p-entry-date">${esc(e.duration)}</div></div>
      ${e.description? `<div class="p-summary">${esc(e.description)}</div>`:''}</div>`).join('') || '';
    case 'interests': return state.interests.length? `<div class="p-tags">${state.interests.map(t=>`<span>${esc(t)}</span>`).join('')}</div>` : '';
    case 'references': {
      const r = state.references;
      if(r.availableOnRequest) return `<p class="p-summary">Available upon request.</p>`;
      return r.list.filter(e=>e.name).map(e=>`<div class="p-entry"><div class="p-entry-role">${esc(e.name)}</div><div class="p-entry-loc">${esc(e.role)} ${e.contact? '· '+esc(e.contact):''}</div></div>`).join('') || '';
    }
    default: return '';
  }
}

/* =====================================================================
   ACTIONS — bound on window for inline onclick handlers
===================================================================== */
window.toggleOpen = (key)=> setState(s=> s.openSection = (s.openSection===key? null : key));
window.toggleEnabled = (key)=> setState(s=> s.sectionEnabled[key] = !s.sectionEnabled[key]);
window.moveSection = (key,dir)=> setState(s=>{
  const arr = s.sectionOrder; const i = arr.indexOf(key); const j = i+dir;
  if(j<0||j>=arr.length) return;
  [arr[i],arr[j]] = [arr[j],arr[i]];
});
window.setPersonalFlag = (flag,val)=> setState(s=> s.personal[flag]=val);
function readImageFile(file){
  if(!file) return;
  if(!/^image\/(png|jpeg|webp)$/.test(file.type)){ alert('Please use a PNG, JPG, or WEBP image.'); return; }
  if(file.size > 5*1024*1024){ alert('Please choose an image under 5MB.'); return; }
  const reader = new FileReader();
  reader.onload = ()=> setState(s=>{ s.personal.profileImage = reader.result; s.personal.showImage = true; });
  reader.readAsDataURL(file);
}
window.handlePhotoSelect = (e)=> readImageFile(e.target.files[0]);
window.handlePhotoDrop = (e, box)=>{
  e.preventDefault(); box.classList.remove('drag');
  readImageFile(e.dataTransfer.files[0]);
};
window.removePhoto = ()=> setState(s=>{ s.personal.profileImage = ''; s.personal.showImage = false; });
window.addEntry = (kind)=> setState(s=>{
  const makers = {experience:blankExperience, education:blankEducation, projects:blankProject, certifications:blankCert, internships:blankExperience, achievements:blankAchievement, languages:blankLanguage, volunteer:blankVolunteer, references:blankReference};
  if(kind==='references'){ s.references.list.push(blankReference()); }
  else s[kind].push(makers[kind]());
});
window.removeEntry = (kind,idx)=> setState(s=>{ if(kind==='references') s.references.list.splice(idx,1); else s[kind].splice(idx,1); });
window.duplicateEntry = (kind,idx)=> setState(s=>{ const copy = JSON.parse(JSON.stringify(s[kind][idx])); copy.id = uid(); s[kind].splice(idx+1,0,copy); });
window.moveEntry = (kind,idx,dir)=> setState(s=>{
  const arr = kind==='references'? s.references.list : s[kind];
  const j = idx+dir; if(j<0||j>=arr.length) return; [arr[idx],arr[j]]=[arr[j],arr[idx]];
});
window.removeTag = (kind,key,i)=> setState(s=>{
  if(kind==='top') s.interests.splice(i,1); else s.skills[key].splice(i,1);
});
window.addTagFromInput = (kind,key)=>{
  const sel = `[data-tag-input="${kind}:${key}"]`;
  const inp = document.querySelector(sel);
  addTagValue(kind,key,inp.value);
};
function addTagValue(kind,key,val){
  val = (val||'').trim(); if(!val) return;
  setState(s=>{
    const arr = kind==='top'? s.interests : s.skills[key];
    if(!arr.map(x=>x.toLowerCase()).includes(val.toLowerCase())) arr.push(val);
  });
}
window.aiGenerateSummary = aiGenerateSummary;
window.aiImproveBullets = aiImproveBullets;
window.aiSuggestSkills = aiSuggestSkills;

/* =====================================================================
   GLOBAL CHANGE DELEGATION (avoids re-binding listeners per field)
===================================================================== */
function setupDelegation(root){
  root.addEventListener('input', e=>{
    const t = e.target;
    if(t.matches('[data-key]')){
      const block = t.closest('[data-kind]');
      const sec = t.closest('[data-sec]');
      let path;
      if(block){
        const kind = block.dataset.kind, idx = +block.dataset.idx;
        const key = t.dataset.key;
        const target = kind==='references'? state.references.list[idx] : state[kind][idx];
        target[key] = t.value;
        save(); // light-touch save without full re-render to keep caret position
        // re-render preview only
        document.querySelector('.preview-pane').innerHTML = renderPreview();
        return;
      } else if(sec){
        const secKey = sec.dataset.sec;
        if(secKey==='personal'){ state.personal[t.dataset.key] = t.value; }
        else if(secKey==='summary'){ state.summary[t.dataset.key] = t.value;
          // update counter live
          const counter = sec.querySelector('.counter'); const len = t.value.length;
          if(counter){ counter.textContent = `${len} characters · recommended 200–400`; counter.classList.toggle('over', len>0 && (len<200||len>400)); }
        }
        save();
        document.querySelector('.preview-pane').innerHTML = renderPreview();
        return;
      }
    }
    if(t.matches('[data-prof]')){
      state.skills.proficiency[t.dataset.prof] = +t.value;
      save();
      document.querySelector('.preview-pane').innerHTML = renderPreview();
    }
  });

  root.addEventListener('change', e=>{
    const t = e.target;
    if(t.matches('[data-flag]')){
      const block = t.closest('[data-kind]');
      if(block){
        const kind = block.dataset.kind, idx = +block.dataset.idx;
        const target = kind==='references'? state.references.list[idx] : state[kind][idx];
        target[t.dataset.flag] = t.checked;
      } else {
        const sec = t.closest('[data-sec]');
        if(sec && sec.dataset.sec==='personal') state.personal[t.dataset.flag] = t.checked;
        else if(sec && sec.dataset.sec==='skills') state.skills[t.dataset.flag] = t.checked;
        else if(sec && sec.dataset.sec==='references') state.references[t.dataset.flag] = t.checked;
      }
      save(); render();
      return;
    }
    if(t.matches('select[data-key]')){
      const block = t.closest('[data-kind]');
      if(block){ const kind=block.dataset.kind, idx=+block.dataset.idx; state[kind][idx][t.dataset.key] = t.value; save(); document.querySelector('.preview-pane').innerHTML = renderPreview(); }
    }
  });

  root.addEventListener('keydown', e=>{
    if(e.target.matches('[data-tag-input]') && e.key==='Enter'){
      e.preventDefault();
      const [kind,key] = e.target.dataset.tagInput.split(':');
      addTagValue(kind,key,e.target.value);
      e.target.value='';
    }
  });
}

function filenameBase(){
  const n = (state.personal.fullName||'resume').trim().replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'');
  return n || 'resume';
}
window.exportPDF = ()=>{
  const paper = document.getElementById('resume-paper');
  if(!paper){ alert('Add some resume content first.'); return; }
  const styleTags = Array.from(document.querySelectorAll('style')).map(s=>s.outerHTML).join('\n');
  const linkTags = Array.from(document.querySelectorAll('link[rel="stylesheet"]')).map(l=>l.outerHTML).join('\n');
  const docHTML = `<!DOCTYPE html><html><head><meta charset="utf-8"><title>${esc(filenameBase())}</title>
    ${linkTags}${styleTags}
    <style>
      html,body{margin:0;background:#fff;}
      .paper{box-shadow:none !important;margin:0 auto !important;border-radius:0 !important;}
      .pdf-banner{position:sticky;top:0;background:var(--primary,#5B5BF5);color:#fff;text-align:center;
        padding:10px 14px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;z-index:10;}
      .pdf-banner button{margin-left:10px;background:#fff;color:var(--primary,#5B5BF5);border:none;
        padding:6px 14px;border-radius:8px;font-weight:700;cursor:pointer;font-size:12.5px;}
      @media print{ .pdf-banner{display:none !important;} }
    </style>
    </head><body>
    <div class="pdf-banner">This is your resume, ready to save. Press <b>Ctrl/Cmd + P</b> and choose "Save as PDF".
      <button onclick="window.print()">Print / Save as PDF</button>
    </div>
    ${paper.outerHTML}
    </body></html>`;
  const blob = new Blob([docHTML], {type:'text/html'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.target = '_blank'; a.rel = 'noopener';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=> URL.revokeObjectURL(url), 30000);
};
window.exportJSON = ()=>{
  const blob = new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  triggerDownload(blob, filenameBase()+'.json');
};
window.exportDOCX = ()=>{
  const paper = document.getElementById('resume-paper');
  if(!paper) return;
  const styles = `body{font-family:Calibri,Arial,sans-serif;color:#1a1a1a;} h1{font-size:22pt;margin-bottom:2pt;} .p-title{font-size:12pt;color:#444;margin-bottom:6pt;} .p-h{font-size:11pt;text-transform:uppercase;letter-spacing:1px;color:#5B5BF5;border-bottom:1px solid #ccc;margin-top:14pt;} .p-contact span:not(:last-child)::after{content:' · ';} ul{margin:4pt 0;} .p-entry-date{color:#666;font-size:9pt;}`;
  const html = `<html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
  <head><meta charset="utf-8"><title>${esc(filenameBase())}</title><style>${styles}</style></head>
  <body>${paper.innerHTML}</body></html>`;
  const blob = new Blob(['\ufeff', html], {type:'application/msword'});
  triggerDownload(blob, filenameBase()+'.doc');
};
function triggerDownload(blob, name){
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = name; document.body.appendChild(a); a.click();
  setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 200);
}
window.importJSON = (input)=>{
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{ const parsed = JSON.parse(reader.result); state = parsed; save(); render(); }
    catch(e){ alert('Could not read that file — make sure it is a JSON export from this app.'); }
  };
  reader.readAsText(file);
};
window.resetAll = ()=>{ if(confirm('Clear all resume data and start over?')){ state = freshState(); save(); render(); } };

function render(){
  const app = document.getElementById('app');
  if(currentPage==='builder'){
    document.body.classList.remove('on-landing');
    app.innerHTML = renderApp();
    setupDelegation(document.getElementById('editorPane'));

  }
  document.body.classList.add('on-landing');
  if(currentPage==='guides'){
    app.innerHTML = renderGuidesIndex();
  } else if(SEO_PAGES[currentPage]){
    app.innerHTML = renderSeoPage(currentPage);
  } else {
    app.innerHTML = renderLanding();
  }
}
